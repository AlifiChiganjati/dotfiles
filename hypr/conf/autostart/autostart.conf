# ----------------------------------------------------- 
# Autostart
# ----------------------------------------------------- 

# Setup XDG for screen sharing
exec-once = ~/.config/scripts/xdg-portal.sh

# Start Polkit
# Test Polkit pkexec --user username alacritty
# exec-once=/usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# Load Dunst Notification Manager
exec-once = dunst

# Using hypridle to start hyprlock
exec-once = hypridle

# Load cliphist history
exec-once = wl-paste --watch cliphist store

# Start ewww daemon
exec-once = ~/dotfiles/scripts/eww.sh

# Initialize waypaper
# exec-once = hyprpaper
exec-once = swww-daemon

exec-once = dbus-update-activation-environment --all

exec-once = brightnessctl s 30%

# Launch Waybar
# exec-once = ~/dotfiles/waybar/launch.sh

# Start autostart cleanup
# exec-once = ~/dotfiles/hypr/scripts/cleanup.sh

